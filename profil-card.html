<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de profil professionnelle!</title>
    <link rel="stylesheet" href="profil-card.css">
</head>
<body>
    <main>
        <article class="profil-card" >
            <!-- /* ==========  Profil Card Header    ========== */ -->
            <header class="profil-card-header">
                <div class="profil-card-header-image-block">
                    <img
                       src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?fit=crop&w=300&h=300"
                       alt="Portrait de l'ingénieur"
                       class="profil-card-header-img"
                       />
                    <span class="profil-card-header-status" title="Disponible" ></span>
                </div>

                <div class="profil-card-header-text-block">
                    <h1 class="profil-card-header-title" >LEKEMO Sullivan</h1>
                    <span class="profil-card-header-subtitle">Ingénieur Logiciel en devenir</span>
                </div>

            </header>

            <!-- /* ==========  Profil Card Body    ========== */ -->
            <div class="profil-card-body" >
                <p class="profil-card-body-description" >
                    Spécialiste dans la conception de systèmes distribués et d'interfaces centrées sur l'utilisateur. Passionné par l'accessibilité et la performance web.
                </p>
            </div>

            <!-- /* ==========  Profil Card Body    ========== */ -->
            <footer class="profil-card-footer" >
                <ul class="profil-card-footer-skills-list">
                    <li class="profil-card-footer-skills-item">HTML5</li>
                    <li class="profil-card-footer-skills-item">CSS3</li>
                    <li class="profil-card-footer-skills-item">Acessibilité</li>
                </ul>
                <button class="profil-card-footer-btn" aria-label="Contactez LEKEMO Sullivan par mail">
                    Contactez moi
                </button>
            </footer>

        </article>
    </main>

</body>
</html>
